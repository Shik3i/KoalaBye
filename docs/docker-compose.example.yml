services:
  koalabye:
    image: ghcr.io/shik3i/koalabye:latest
    container_name: koalabye
    restart: always
    environment:
      # Public URL of the instance (required for redirects/emails)
      - KOALABYE_BASE_URL=https://bye.koalastuff.net
      
      # Internal port (must match the port inside the container)
      - KOALABYE_LISTEN_ADDR=:8080
      
      # SQLite database path inside the container (mapped to host volume)
      - KOALABYE_DATABASE_PATH=/data/koalabye.db
      
      # IMPORTANT: Replace with a secure random string! (e.g. openssl rand -hex 32)
      - KOALABYE_SECRET=change-me-to-a-very-long-and-secure-random-string
      
      # Mode (selfhost or cloud)
      - KOALABYE_MODE=selfhost
      
      # Registration and Invite Settings
      - KOALABYE_REGISTRATION_ENABLED=false
      - KOALABYE_INVITE_ONLY=true
      - KOALABYE_INVITE_REGISTRATION_ENABLED=true
      
      # Ensure cookies are only sent over HTTPS
      - KOALABYE_SECURE_COOKIES=true
      
      # Name of the instance (visible to users)
      - KOALABYE_INSTANCE_NAME=KoalaBye
      
      # Optional: Bootstrap the first admin user on startup (only created if no users exist)
      # - KOALABYE_BOOTSTRAP_ADMIN_USERNAME=admin
      # - KOALABYE_BOOTSTRAP_ADMIN_PASSWORD=your-secure-password
      # - KOALABYE_BOOTSTRAP_ADMIN_DISPLAY_NAME=Administrator
    volumes:
      - /home/koala/docker/koalabye/data:/data
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true


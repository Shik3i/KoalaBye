name: Release image validation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build tagged image without publishing
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_REF_NAME}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "koalabye:${GITHUB_REF_NAME}" .
      - name: Inspect version metadata
        run: docker image inspect "koalabye:${GITHUB_REF_NAME}"

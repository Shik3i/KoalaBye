services:
  koalabye:
    build: .
    restart: unless-stopped
    environment:
      KOALABYE_BASE_URL: ${KOALABYE_BASE_URL:-http://localhost:8080}
      KOALABYE_LISTEN_ADDR: ":8080"
      KOALABYE_DATABASE_PATH: /data/koalabye.db
      KOALABYE_SECRET: ${KOALABYE_SECRET:?Set KOALABYE_SECRET in .env}
      KOALABYE_MODE: ${KOALABYE_MODE:-selfhost}
      KOALABYE_REGISTRATION_ENABLED: ${KOALABYE_REGISTRATION_ENABLED:-false}
      KOALABYE_INVITE_ONLY: ${KOALABYE_INVITE_ONLY:-true}
      KOALABYE_INVITE_REGISTRATION_ENABLED: ${KOALABYE_INVITE_REGISTRATION_ENABLED:-true}
      KOALABYE_SECURE_COOKIES: ${KOALABYE_SECURE_COOKIES:-false}
      KOALABYE_INSTANCE_NAME: ${KOALABYE_INSTANCE_NAME:-KoalaBye}
      KOALABYE_DEFAULT_MAX_ORGANIZATIONS_PER_USER: ${KOALABYE_DEFAULT_MAX_ORGANIZATIONS_PER_USER:-1}
      KOALABYE_DEFAULT_MAX_CAMPAIGNS_PER_ORG: ${KOALABYE_DEFAULT_MAX_CAMPAIGNS_PER_ORG:-3}
      KOALABYE_DEFAULT_MAX_MEMBERS_PER_ORG: ${KOALABYE_DEFAULT_MAX_MEMBERS_PER_ORG:-5}
      KOALABYE_DEFAULT_MAX_ACTIVE_INVITES_PER_ORG: ${KOALABYE_DEFAULT_MAX_ACTIVE_INVITES_PER_ORG:-10}
      KOALABYE_DEFAULT_MAX_MONTHLY_VISITS_PER_ORG: ${KOALABYE_DEFAULT_MAX_MONTHLY_VISITS_PER_ORG:-10000}
      KOALABYE_DEFAULT_MAX_MONTHLY_SUBMISSIONS_PER_ORG: ${KOALABYE_DEFAULT_MAX_MONTHLY_SUBMISSIONS_PER_ORG:-1000}
    ports:
      - "8080:8080"
    volumes:
      - koalabye_data:/data
    networks:
      - koalabye

volumes:
  koalabye_data:

networks:
  koalabye:
    name: koalabye

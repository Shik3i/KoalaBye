services:
  koalabye:
    image: ${KOALABYE_IMAGE:-koalabye:rc}
    restart: unless-stopped
    env_file: .env.production
    environment:
      KOALABYE_LISTEN_ADDR: ":8080"
      KOALABYE_DATABASE_PATH: /data/koalabye.db
      KOALABYE_SECURE_COOKIES: "true"
      KOALABYE_REGISTRATION_ENABLED: "false"
    volumes:
      - koalabye_data:/data
    networks: [koalabye]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile.production.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [koalabye]
    depends_on:
      koalabye:
        condition: service_healthy

volumes:
  koalabye_data:
  caddy_data:
  caddy_config:

networks:
  koalabye:
